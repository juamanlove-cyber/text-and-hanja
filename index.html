<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text & Hanja 3.0</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #8e44ad;
            --highlight: #e74c3c;
            --bg: #f0f2f5;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', sans-serif;
            --font-serif: 'Batang', '바탕', 'Noto Serif KR', serif;
        }

        body {
            background: var(--bg);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .phone-frame {
            width: 100%;
            max-width: 400px;
            height: 850px;
            background: #1a1a1a;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #1a1a1a;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 100;
        }

        header {
            padding: 40px 20px 20px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: 800;
        }

        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #666;
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        main {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.2rem;
        }

        .card p {
            font-size: 0.9rem;
            color: #666;
            margin: 0;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            resize: none;
            font-family: var(--font-sans);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        #output-area {
            font-size: 1.1rem;
            line-height: 1.8;
            white-space: pre-wrap;
            min-height: 200px;
            padding: 15px;
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .hanja-word {
            color: var(--highlight);
            font-weight: bold;
            font-family: var(--font-serif);
            cursor: pointer;
            border-bottom: 2px solid rgba(231, 76, 60, 0.4);
            transition: all 0.2s;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .hanja-word:hover {
            background: rgba(231, 76, 60, 0.1);
            border-bottom-color: var(--highlight);
        }

        .bottom-nav {
            background: white;
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            color: #999;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .section-title {
            margin-bottom: 15px;
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="phone-screen">
        <div class="notch"></div>
        
        <header>
            <h1>Text & Hanja</h1>
            <div class="toggle-wrapper">
                <span>전체 한자 변환</span>
                <label class="switch">
                    <input type="checkbox" id="mode-toggle" onchange="toggleMode()">
                    <span class="slider"></span>
                </label>
            </div>
        </header>

        <main>
            <div class="card">
                <div style="font-size: 2rem; margin-bottom: 10px;">🌉</div>
                <h2>과거와 현재를 잇는 다리</h2>
                <p>현대 뉴스로 한자를 배우고<br>역사 속 한자 텍스트를 현대어로 읽어보세요</p>
            </div>

            <div class="section-title">📝 현대 텍스트 → 한자 학습</div>
            <textarea id="input-text" placeholder="뉴스 기사나 텍스트를 붙여넣으세요..." oninput="handleInput()">디지털 시대의 문해력, 우리가 놓치고 있는 것들

현대 사회에서 정보의 홍수는 역설적으로 깊이 있는 사고를 방해하곤 합니다. 우리는 매일 수많은 텍스트를 마주하지만, 그것을 진정으로 소화하고 있는지에 대해서는 의문이 듭니다.

특히 최근 교육계와 학계에서 화두가 되고 있는 것은 바로 문해력의 저하 문제입니다. 단순히 글자를 읽을 줄 아는 것을 넘어, 텍스트의 맥락에 담긴 의미와 저자의 의도를 파악하는 능력은 점차 퇴화되고 있습니다.</textarea>

            <div class="section-title">✨ 한자어 이해</div>
            <div id="output-area">결과가 여기에 표시됩니다.</div>
        </main>

        <div class="bottom-nav">
            <div class="nav-item active">
                <span class="nav-icon">🏠</span>
                홈
            </div>
            <div class="nav-item">
                <span class="nav-icon">📖</span>
                단어장
            </div>
            <div class="nav-item">
                <span class="nav-icon">📊</span>
                통계
            </div>
            <div class="nav-item">
                <span class="nav-icon">⚙️</span>
                설정
            </div>
        </div>
    </div>
</div>

<script>
    // 확장된 한자 데이터베이스
    const hanjaDB = {
        // 디지털/정보 관련
        "디지털": "디지털", "정보": "情報", "사회": "社會", "현대": "現代",
        "문해력": "文解力", "홍수": "洪水", "역설적": "逆說的", "사고": "思考",
        "방해": "妨害", "텍스트": "텍스트", "소화": "消化", "의문": "疑問",
        
        // 교육 관련
        "교육": "敎育", "교육계": "敎育界", "학계": "學界", "화두": "話頭",
        "문제": "問題", "저하": "低下", "단순": "單純", "글자": "글字",
        "맥락": "脈絡", "의미": "意味", "저자": "著者", "의도": "意圖",
        "파악": "把握", "능력": "能力", "점차": "漸次", "퇴화": "退化",
        
        // 학술 관련
        "연구": "硏究", "논문": "論文", "학술": "學術", "분석": "分析",
        "이론": "理論", "방법": "方法", "결과": "結果", "과정": "過程",
        
        // 문화/언어 관련
        "문화": "文化", "언어": "言語", "한국": "韓國", "중국": "中國",
        "역사": "歷史", "전통": "傳統", "고전": "古典", "문학": "文學",
        
        // 기본 개념
        "시대": "時代", "세계": "世界", "국가": "國家", "민족": "民族",
        "인간": "人間", "생활": "生活", "일상": "日常", "경험": "經驗",
        "발전": "發展", "변화": "變化", "성장": "成長", "진보": "進步"
    };

    let isFullMode = false;
    let savedWords = JSON.parse(localStorage.getItem('savedHanjaWords') || '[]');

    // 초기 실행
    window.onload = function() {
        handleInput();
    };

    // 전체 한자 변환 모드 토글
    function toggleMode() {
        isFullMode = document.getElementById('mode-toggle').checked;
        handleInput();
    }

    // 텍스트 입력 처리 및 변환
    function handleInput() {
        const text = document.getElementById('input-text').value;
        const outputDiv = document.getElementById('output-area');
        
        if (!text.trim()) {
            outputDiv.innerHTML = '<span style="color:#999">결과가 여기에 표시됩니다.</span>';
            return;
        }

        let result = text;

        // 긴 단어부터 매칭하여 겹치는 문제 방지
        const sortedKeys = Object.keys(hanjaDB).sort((a, b) => b.length - a.length);
        
        sortedKeys.forEach(key => {
            const hanja = hanjaDB[key];
            const regex = new RegExp(key, 'g');
            
            if (isFullMode) {
                // 전체 변환 모드: 바로 한자로 표시하고 네이버 사전 연결
                result = result.replace(regex, 
                    `<span class="hanja-word" onclick="openNaverDict('${hanja}')" title="클릭하면 네이버 한자사전으로 이동">${hanja}</span>`
                );
            } else {
                // 학습 모드: 한글에 밑줄, 클릭하면 한자로 변환
                result = result.replace(regex, 
                    `<span class="hanja-word" onclick="toggleWord(this, '${key}', '${hanja}')" title="클릭하면 한자로 변환">${key}</span>`
                );
            }
        });

        // 줄바꿈 처리
        result = result.replace(/\n/g, '<br>');
        outputDiv.innerHTML = result;
    }

    // 개별 단어 토글 (한글 ↔ 한자)
    window.toggleWord = function(element, korean, hanja) {
        if (element.textContent === korean) {
            // 한글 → 한자로 변환
            element.textContent = hanja;
            element.title = "클릭하면 네이버 한자사전으로 이동";
            element.onclick = function() { openNaverDict(hanja); };
            
            // 단어장에 저장
            saveWord(korean, hanja);
        } else {
            // 이미 한자 상태면 네이버 사전으로 이동
            openNaverDict(hanja);
        }
    };

    // 네이버 한자사전 열기
    window.openNaverDict = function(query) {
        const url = `https://hanja.dict.naver.com/#/search?query=${encodeURIComponent(query)}`;
        window.open(url, '_blank', 'width=800,height=600');
    };

    // 단어장에 저장
    function saveWord(korean, hanja) {
        const word = { korean, hanja, date: new Date().toLocaleDateString() };
        if (!savedWords.some(w => w.korean === korean)) {
            savedWords.push(word);
            localStorage.setItem('savedHanjaWords', JSON.stringify(savedWords));
        }
    }

    // 하단 네비게이션 기능 (예시)
    document.querySelectorAll('.nav-item').forEach((item, index) => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            this.classList.add('active');
            
            // 간단한 기능 예시
            switch(index) {
                case 0: // 홈
                    break;
                case 1: // 단어장
                    alert(`저장된 단어: ${savedWords.length}개`);
                    break;
                case 2: // 통계
                    alert('학습 통계 기능 (개발 예정)');
                    break;
                case 3: // 설정
                    alert('설정 기능 (개발 예정)');
                    break;
            }
        });
    });
</script>

</body>
</html>
